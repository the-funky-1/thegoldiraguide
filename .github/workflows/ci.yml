name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: '2026-04-01'
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
      SANITY_REVALIDATE_SECRET: ${{ secrets.SANITY_REVALIDATE_SECRET }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Sanity type generation
        run: |
          pnpm exec sanity schema extract --enforce-required-fields
          pnpm exec sanity typegen generate
          if [ -f src/sanity/types.generated.ts ] && ! git diff --quiet src/sanity/types.generated.ts; then
            echo "Generated Sanity types are out of date. Run 'pnpm exec sanity typegen generate' and commit."
            git diff src/sanity/types.generated.ts
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Compliance-as-code (FTC disclosure guard)
        run: pnpm check:disclosure

      - name: No hard-coded hex colors outside design tokens
        run: pnpm check:no-hex

      - name: Build + bundle size budget
        run: pnpm check:bundle

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (home, disclosure, security headers, a11y)
        run: pnpm test:e2e

      - name: Regenerate style hashes
        run: pnpm exec tsx scripts/generate-style-hashes.ts
      - name: Ensure style hashes are committed
        run: |
          if ! git diff --quiet src/design/style-hashes.generated.ts; then
            echo "Style hashes changed. Run 'pnpm generate:style-hashes' and commit."
            git diff src/design/style-hashes.generated.ts
            exit 1
          fi

      - name: JSON-LD validation
        run: |
          pnpm start -p 3000 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:3000/ > /dev/null; then break; fi
            sleep 1
          done
          BASE_URL=http://localhost:3000 pnpm check:jsonld
          kill $SERVER_PID

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep --config=semgrep.yml --config=p/typescript --config=p/react --config=p/owasp-top-ten --error

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: verify
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: '2026-04-01'
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm dlx @lhci/cli@latest autorun
